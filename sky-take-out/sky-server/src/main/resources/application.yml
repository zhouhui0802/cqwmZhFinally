server:
  port: 8080
spring:
  profiles:
    active: dev #激活哪个配置文件，一般来说会有dev开发环境 prod生产环境  test测试环境
  main:
    allow-circular-references: true  #意思：允许 Bean 互相循环注入，解决 SpringBoot 启动报错。但是一般来说，最好不要这么写
  datasource:
    druid:  #为什么写变量读写，当激活为dev的时候，就会读取dev中的配置
      driver-class-name: ${sky.datasource.driver-class-name}
      url: jdbc:mysql://${sky.datasource.host}:${sky.datasource.port}/${sky.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
      username: ${sky.datasource.username}
      password: ${sky.datasource.password}

mybatis:
  #mapper配置文件
  mapper-locations: classpath:mapper/*.xml   # classpath: → 从项目的资源根目录开始（就是 resources 文件夹）  mapper/ → 进入 mapper 文件夹  *.xml → 匹配所有以 .xml 结尾的文件
  type-aliases-package: com.sky.entity
  configuration:
    #开启驼峰命名
    map-underscore-to-camel-case: true

logging:
  level:
    com:
      sky:
        mapper: debug
        service: info
        controller: info

sky:
  jwt:
    # 设置jwt签名加密时使用的秘钥
    admin-secret-key: itcast
    # 设置jwt过期时间
    admin-ttl: 7200000
    # 设置前端传递过来的令牌名称
    admin-token-name: token